# =============================================================================
# Aegis-eBPF — Continuous Integration (main)
# =============================================================================
# Matrix: `runs-on` (GitHub-hosted Ubuntu → **host kernel** / verifier behavior)
#        × `container` (**user-space** libc + toolchain: glibc Debian/Ubuntu/Fedora/Alma,
#        musl Alpine).
#
# The eBPF program is **CO-RE** (same BPF ELF across kernels); this matrix stress-tests
# **load + verifier + ringbuf** on several host kernels while compiling/linking userspace and
# running `cargo test` in diverse distros (package layouts, glibc vs musl, clang/llvm stacks).
#
# Containers run **privileged** so `BPF_PROG_LOAD` / tracepoint attach from tests work.
#
# Notes:
# - Do **not** use `cargo ... --all-features` on the whole workspace (see `aegis-ebpf-ebpf` /
#   `ebpf-bin` / duplicate `panic_impl` on the host).
# - `linux-headers-$(uname -r)` only applies cleanly on **Debian/apt**-based images where the
#   host kernel package exists in apt; on Fedora/Alma/Alpine we install generic dev headers /
#   libbpf dev packages (host `uname -r` does not match distro kernel packages).
# - For **exact** kernel-version CO-RE matrices, still use `scripts/vm/` (Vagrant).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: "${{ matrix.os }} × ${{ matrix.container }}"
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
      # BPF syscalls from non-init user namespaces often need privileged containers.
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-24.04]
        container:
          - ubuntu:latest
          - debian:bookworm
          - fedora:latest
          - almalinux:9
          - alpine:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Cross-distro bootstrap: curl/git/sudo + clang/llvm/elf/zlib + protobuf + headers
      #     where applicable (apt / dnf / apk).
      - name: Install OS packages (dynamic by /etc/os-release)
        shell: bash
        run: |
          set -euxo pipefail
          if [[ ! -f /etc/os-release ]]; then
            echo "No /etc/os-release; cannot detect distro" >&2
            exit 1
          fi
          # shellcheck source=/dev/null
          source /etc/os-release

          case "${ID:-unknown}" in
            ubuntu|debian)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git sudo pkg-config \
                build-essential clang llvm libelf-dev zlib1g-dev protobuf-compiler \
                linux-libc-dev
              # Best-effort: kernel UAPI headers matching the **host** kernel (visible in container).
              if apt-get install -y --no-install-recommends "linux-headers-$(uname -r)" 2>/dev/null; then
                echo "Installed linux-headers-$(uname -r)"
              elif apt-get install -y --no-install-recommends linux-headers-generic 2>/dev/null; then
                echo "Installed linux-headers-generic (fallback)"
              else
                echo "WARN: could not install matching linux-headers; continuing"
              fi
              # bpftool (virtual package on Debian/Ubuntu — pull via linux-tools-*).
              KERN="$(uname -r)"
              if apt-get install -y --no-install-recommends "linux-tools-${KERN}" 2>/dev/null; then
                echo "Installed linux-tools-${KERN}"
              elif apt-get install -y --no-install-recommends "linux-cloud-tools-${KERN}" 2>/dev/null; then
                echo "Installed linux-cloud-tools-${KERN}"
              else
                echo "WARN: bpftool not installed (optional for this CI)"
              fi
              ;;
            fedora)
              dnf -y update
              dnf -y install \
                ca-certificates curl git sudo pkgconf-pkg-config \
                gcc gcc-c++ make clang llvm elfutils-libelf-devel zlib-devel \
                protobuf-compiler protobuf-devel \
                kernel-headers kernel-devel || true
              # kernel-devel often does not match GitHub's cloud kernel; ignore failure.
              ;;
            almalinux)
              dnf -y install epel-release || true
              dnf -y update
              dnf -y install \
                ca-certificates curl git sudo pkgconf-pkg-config \
                gcc gcc-c++ make clang llvm elfutils-libelf-devel zlib-devel \
                protobuf-compiler protobuf-devel \
                kernel-headers kernel-devel || true
              ;;
            alpine)
              apk update
              apk add --no-cache \
                ca-certificates curl git sudo bash build-base pkgconfig \
                musl-dev linux-headers clang llvm lld \
                elfutils-dev zlib-dev protobuf-dev protoc
              ;;
            *)
              echo "Unsupported ID=${ID} from /etc/os-release" >&2
              exit 1
              ;;
          esac

          command -v bpftool && bpftool version || true

      # --- Rust: stable + nightly + rust-src (eBPF build-std).
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, rust-src

      - name: Install nightly Rust (eBPF / build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # --- Cache: distinguish matrix cells (host OS × user-space image).
      - name: Cache Cargo home and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-${{ matrix.container }}"

      # --- bpf-linker (nested eBPF link). LLVM prefix hints for distro LLVM layouts.
      - name: Install bpf-linker
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -f /etc/os-release ]]; then source /etc/os-release; fi
          export LLVM_SYS_170_PREFIX=""
          export LLVM_SYS_180_PREFIX=""
          export LLVM_SYS_190_PREFIX=""
          case "${ID:-}" in
            ubuntu|debian)
              if [[ -d /usr/lib/llvm-19 ]]; then export LLVM_SYS_190_PREFIX=/usr/lib/llvm-19
              elif [[ -d /usr/lib/llvm-18 ]]; then export LLVM_SYS_180_PREFIX=/usr/lib/llvm-18
              elif [[ -d /usr/lib/llvm-17 ]]; then export LLVM_SYS_170_PREFIX=/usr/lib/llvm-17
              fi
              ;;
            fedora|almalinux)
              if compgen -G "/usr/lib64/llvm19/lib" > /dev/null; then export LLVM_SYS_190_PREFIX=/usr/lib64/llvm19
              elif compgen -G "/usr/lib64/llvm18/lib" > /dev/null; then export LLVM_SYS_180_PREFIX=/usr/lib64/llvm18
              fi
              ;;
            alpine)
              if [[ -d /usr/lib/llvm19 ]]; then export LLVM_SYS_190_PREFIX=/usr/lib/llvm19
              elif [[ -d /usr/lib/llvm18 ]]; then export LLVM_SYS_180_PREFIX=/usr/lib/llvm18
              fi
              ;;
          esac
          cargo install bpf-linker --version 0.10.3

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Build and test (prometheus feature on aegis-ebpf)
        run: |
          cargo build -p aegis-ebpf --features prometheus --verbose
          cargo test -p aegis-ebpf --features prometheus --test observability_integration --verbose

      # --- Full test suite: `.cargo/linux-test-runner.sh` uses `sudo -E` for test binaries
      #     so `cargo test` itself should still see rustup on PATH. Invoke under `sudo -E bash -lc`
      #     when not root; call `cargo` directly when already root (containers often are).
      - name: Run tests (privileged, full BPF suite)
        shell: bash
        run: |
          set -euxo pipefail
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          TEST_CMD='cargo test --workspace --verbose -- --include-ignored'
          if [[ "$(id -u)" -eq 0 ]]; then
            bash -lc "$TEST_CMD"
          elif command -v sudo >/dev/null 2>&1; then
            sudo -E env "PATH=${PATH}" "HOME=${HOME}" "RUSTUP_HOME=${RUSTUP_HOME}" "CARGO_HOME=${CARGO_HOME}" \
              bash -lc "$TEST_CMD"
          else
            bash -lc "$TEST_CMD"
          fi
